name: Release-plz

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches: [ main ]

jobs:
  # Keeps a "Release" PR up to date with the next version bump + changelog,
  # generated from commits on main since the last tag.
  release-plz-pr:
    name: Release-plz PR
    if: github.repository_owner == 'statrs-dev'
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # When the Release PR above is merged, this tags the commit, publishes
  # to crates.io, and cuts a GitHub release.
  release-plz-release:
    name: Release-plz release
    if: github.repository_owner == 'statrs-dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
